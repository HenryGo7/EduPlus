<main class="cursos-container">

    <section class="courses-section">
        <div class="section-header">
            <hr>
            <h2>Cursos</h2>
            <hr>
        </div>

        <div class="courses-grid">
            <div class="course-card" *ngFor="let curso of listaCursos">
                <div class="course-img" [ngClass]="curso.colorClase">
                    <img [src]="curso.imagen" [alt]="curso.titulo">
                </div>
                <div class="course-info">
                    <h3>{{ curso.titulo }}</h3>
                    <p>{{ curso.categoria }}</p>
                    <button 
                        class="btn-more" 
                        [ngClass]="curso.botonClase"
                        (click)="verDetalle(curso)"
                    >Ver Más</button>
                </div>
            </div>
        </div>
    </section>
</main>
