<div class="modal-overlay" (click)="cerrar()">
    <div class="login-card" (click)="$event.stopPropagation()">
        <button class="close-btn" (click)="cerrar()">×</button>

        <h2>Bienvenido a <span>EduPlus</span></h2>
        <p>Ingresa para acceder a tus cursos</p>

        <form class="login-form">
            <input type="email" placeholder="Correo electrónico"
                class="login-input">
            <input type="password" placeholder="Contraseña" class="login-input">

            <button type="submit" class="btn-submit">Iniciar Sesión</button>
        </form>

        <div class="login-footer">
            <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
            <hr>
            <p>¿No tienes cuenta? <a href="#"
                    class="register-link">Regístrate</a></p>
        </div>
    </div>
</div>
