<div class="modal-overlay" (click)="cerrar()" *ngIf="curso">
  <div class="detail-card" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="cerrar()">×</button>
    
  <div class="detail-header" [ngClass]="curso.colorClase">
    <img [src]="curso.imagen" [alt]="curso.titulo">
  </div>

    <div class="detail-body">
      <span class="category-badge">{{ curso.categoria }}</span>
      <h2>{{ curso.titulo }}</h2>
      <p class="description">
        Este curso está diseñado para llevarte de la mano en el mundo de {{ curso.titulo }}. 
        Aprenderás bases sólidas y proyectos reales.
      </p>
      
      <div class="features">
        <span><i class="fas fa-clock"></i> 20 Horas</span>
        <span><i class="fas fa-signal"></i> Nivel Básico</span>
      </div>

      <button class="btn-enroll" [ngClass]="curso.botonClase">Inscribirme ahora</button>
    </div>
  </div>
</div>
